site_name: "ECCCH - Cloud Assessment Framework Documentation"
site_description: "ECCCH components, categories, dimensions, and assessment tools"
theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - content.code.copy
    - search.highlight
    - search.suggest
extra_css:
  - stylesheets/extra.css
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true
plugins:
  - search
nav:
  - Home: index.md
  - ECCCH Components:
    - Overview: components/index.md
    - Main ECCCH components: components/main_components.md
    - Components by evaluable units: components/components_by_evaluable_units.md
  - Resource Categories: categories/index.md
  - Evaluation Dimensions:
    - Overview: dimensions/index.md
    - Data: dimensions/data_dim.md
    - Metadata: dimensions/metadata_dim.md
    - Ontology: dimensions/ontology_dim.md
    - Software: dimensions/software_dim.md
    - Digital services: dimensions/service_dim.md
  - Assessment Tools:
    - Overview: tools/index.md
    - Software quality tools:
      - Overview: tools/software_quality_tools/index.md
      - ISO/IEC 25010 software product quality model: tools/software_quality_tools/isoiec-25010-software-product-quality-model.md
      - ISO/IEC 25023 measurement of system and software product quality: tools/software_quality_tools/isoiec-25023-measurement-of-system-and-software-product-quality.md
      - ISO/IEC 5055 Automated Source Code Quality Measures: tools/software_quality_tools/isoiec-5055-automated-source-code-quality-measures.md
      - OMG ASCQM (Automated Source Code Quality Measures) v1.1: tools/software_quality_tools/omg-ascqm-automated-source-code-quality-measures-v11.md
      - Radon (Python code metrics): tools/software_quality_tools/radon-python-code-metrics.md
      - Visual Studio (IDE) Code Metrics (Maintainability Index and related metrics): tools/software_quality_tools/visual-studio-ide-code-metrics-maintainability-index-and-related-metrics.md
      - Chidamber Kemerer (CK) metrics suite (e.g. via CKJM or similar tools): tools/software_quality_tools/chidamber-kemerer-ck-metrics-suite-eg-via-ckjm-or-similar-tools.md
      - DORA Four Key Metrics (Four Keys): tools/software_quality_tools/dora-four-key-metrics-four-keys.md
      - DORA “Documentation quality” capability: tools/software_quality_tools/dora-documentation-quality-capability.md
      - OpenSSF Best Practices Badge: tools/software_quality_tools/openssf-best-practices-badge.md
      - FAIR for Research Software (FAIR4RS) Principles: tools/software_quality_tools/fair-for-research-software-fair4rs-principles.md
      - SPDX specification: tools/software_quality_tools/spdx-specification.md
